kind = "web"
previewPath = "/"
title = "FANTA11"
version = "1.0.0"
id = "artifacts/fanta11"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20102

[services.development]
run = "pnpm --filter @workspace/fanta11 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fanta11", "run", "build" ]
publicDir = "artifacts/fanta11/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20102"
BASE_PATH = "/"
